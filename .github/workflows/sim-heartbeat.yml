name: Sim Trader Heartbeat

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sim-heartbeat
  cancel-in-progress: false

env:
  PAGES_BRANCH: cursor/streakscope-app-0bb4

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: streakscope/package-lock.json

      - name: Run sim heartbeat
        working-directory: streakscope
        run: |
          npm ci
          node scripts/sim-heartbeat.mjs

      - name: Commit sim state to main
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add streakscope/data/sim-state.json streakscope/data/sim-log.md
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Sim heartbeat: update live strategy state"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync sim data to GitHub Pages branch
        if: steps.commit.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "${PAGES_BRANCH}"
          git checkout "origin/${PAGES_BRANCH}" -b pages-data-sync
          mkdir -p data
          cp streakscope/data/sim-state.json streakscope/data/sim-log.md data/
          git add data/sim-state.json data/sim-log.md
          git diff --staged --quiet || git commit -m "Sim heartbeat: sync data to Pages"
          git push origin pages-data-sync:"${PAGES_BRANCH}"
