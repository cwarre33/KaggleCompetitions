name: Deploy StreakScope

on:
  push:
    branches: [main, cursor/streakscope-app-0bb4]
    paths:
      - "streakscope/**"
      - ".github/workflows/deploy-streakscope.yml"
  pull_request:
    paths:
      - "streakscope/**"
      - ".github/workflows/deploy-streakscope.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: streakscope-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  IS_DEPLOY_BRANCH: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/cursor/streakscope-app-0bb4') }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: streakscope/package-lock.json

      - name: Install and build
        working-directory: streakscope
        run: |
          npm ci
          npm run build

      - name: Publish static site for legacy Pages
        if: env.IS_DEPLOY_BRANCH == 'true'
        run: |
          rm -rf docs
          cp -r streakscope/dist docs
          touch docs/.nojekyll
          cp -r streakscope/dist/* .
          touch .nojekyll

      - name: Commit static site for legacy Pages
        if: env.IS_DEPLOY_BRANCH == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs .nojekyll index.html assets favicon.svg icons.svg
          git diff --staged --quiet || git commit -m "Deploy StreakScope static site"
          git push
