name: Deploy StreakScope

on:
  push:
    branches: [main]
    paths:
      - "streakscope/**"
      - ".github/workflows/deploy-streakscope.yml"
  pull_request:
    paths:
      - "streakscope/**"
      - ".github/workflows/deploy-streakscope.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: streakscope-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: streakscope/package-lock.json

      - name: Install and build
        working-directory: streakscope
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: streakscope/dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
