name: Deploy StreakScope

on:
  push:
    branches: [main]
    paths:
      - "streakscope/**"
      - ".github/workflows/deploy-streakscope.yml"
  pull_request:
    paths:
      - "streakscope/**"
      - ".github/workflows/deploy-streakscope.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: streakscope-pages
  cancel-in-progress: true

# GitHub Pages legacy source for this repo (Settings → Pages).
env:
  PAGES_BRANCH: cursor/streakscope-app-0bb4

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: streakscope/package-lock.json

      - name: Install and build
        working-directory: streakscope
        run: |
          npm ci
          npm run build

      - name: Stage static site artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -rf docs
          cp -r streakscope/dist docs
          touch docs/.nojekyll
          cp -r streakscope/dist/* .
          touch .nojekyll

      - name: Commit static site to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs .nojekyll index.html assets favicon.svg icons.svg
          git diff --staged --quiet || git commit -m "Deploy StreakScope static site"
          git push

      - name: Sync static site to GitHub Pages branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          tar czf /tmp/site.tgz docs index.html assets favicon.svg icons.svg .nojekyll
          git fetch origin "${PAGES_BRANCH}"
          git checkout "origin/${PAGES_BRANCH}" -b pages-deploy
          tar xzf /tmp/site.tgz
          git add docs index.html assets favicon.svg icons.svg .nojekyll
          git diff --staged --quiet || git commit -m "Deploy StreakScope static site from main"
          git push origin pages-deploy:"${PAGES_BRANCH}"
