name: Deploy StreakScope

on:
  push:
    branches: [main, cursor/streakscope-app-0bb4]
    paths:
      - "streakscope/**"
      - ".github/workflows/deploy-streakscope.yml"
  pull_request:
    paths:
      - "streakscope/**"
      - ".github/workflows/deploy-streakscope.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: streakscope-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  IS_DEPLOY_BRANCH: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/cursor/streakscope-app-0bb4') }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: streakscope/package-lock.json

      - name: Install and build
        working-directory: streakscope
        run: |
          npm ci
          npm run build

      - name: Publish static site to docs/
        if: env.IS_DEPLOY_BRANCH == 'true'
        run: |
          rm -rf docs
          cp -r streakscope/dist docs
          touch docs/.nojekyll

      - name: Commit docs for legacy Pages
        if: env.IS_DEPLOY_BRANCH == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --staged --quiet || git commit -m "Deploy StreakScope static site to docs/"
          git push

      - name: Upload Pages artifact
        if: env.IS_DEPLOY_BRANCH == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: streakscope/dist

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/cursor/streakscope-app-0bb4')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
