family: sklearn  # sklearn | torch
algorithm: auto  # auto|logreg|ridge|xgboost|lightgbm|catboost

# Simple baselines
ridge_alpha: 1.0

# Common boosting defaults (override per competition)
xgb_params:
  random_state: 42
  n_estimators: 2000
  learning_rate: 0.05
  max_depth: 4
  subsample: 0.8
  colsample_bytree: 0.8
  reg_lambda: 1.0
  tree_method: hist
  eval_metric: auc

lgb_params:
  random_state: 42
  n_estimators: 4000
  learning_rate: 0.03
  num_leaves: 64
  subsample: 0.8
  colsample_bytree: 0.8
  reg_lambda: 1.0
  objective: binary
  metric: auc
  verbose: -1

cat_params:
  random_seed: 42
  iterations: 4000
  learning_rate: 0.03
  depth: 6
  loss_function: Logloss
  eval_metric: AUC
  verbose: 200

